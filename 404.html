  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    ::selection { background: #3a3a3a; color: #f5f5f5; }
    html { scroll-behavior: smooth; scroll-padding-top: 5rem; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 17px;
      line-height: 1.7;
      color: #e1e1e1;
      background: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #2e2e2e; }
    ::-webkit-scrollbar-thumb { background: #525252; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #626262; }
    html { scrollbar-width: thin; scrollbar-color: #525252 #2e2e2e; }
    .skip-link {
      position: absolute; top: -100%; left: 1rem; padding: 0.5rem 1rem;
      background: #ededed; color: #1a1a1a; font-weight: 600; z-index: 1000;
      border-radius: 0 0 4px 4px; text-decoration: none;
    }
    .skip-link:focus { top: 0; }
    #life {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; pointer-events: none;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 3.2rem;
      background: rgba(22, 22, 22, 0.58);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      transition: border-color 0.3s;
    }
    nav.scrolled { border-bottom-color: rgba(255, 255, 255, 0.09); }
    nav .name {
      font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; font-weight: 500;
      color: #6e6e6e; letter-spacing: 0.04em; text-decoration: none; transition: color 0.2s;
    }
    nav .name:hover { color: #e8e8e8; }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a {
      position: relative; color: #6e6e6e; text-decoration: none;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 400;
      letter-spacing: 0.06em; transition: color 0.2s;
    }
    nav ul a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 1px;
      background: #e8e8e8; transform: scaleX(0); transform-origin: left; transition: transform 0.25s ease;
    }
    nav ul a:hover { color: #e8e8e8; }
    nav ul a:hover::after { transform: scaleX(1); }
    main {
      max-width: 640px; margin: 0 auto; padding: 10rem 2.5rem 4rem;
      background: rgba(22, 22, 22, 0.76);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.55);

    }
    .error-code {

    }
    .home-link {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #8c8c8c;
      border: 1px solid #363636;
      padding: 0.6rem 1.5rem;
      border-radius: 4px;

      transition: color 0.2s, border-color 0.2s;
    }
    .home-link:hover {
      color: #e8e8e8;
      border-color: #626262;
    }
    a { color: #aaaaaa; text-decoration: none; transition: color 0.2s; }
    a:hover, a:focus-visible { color: #e8e8e8; }
    a:focus-visible { outline: 2px solid #626262; outline-offset: 2px; }
    footer {
      max-width: 640px; margin: 0 auto; padding: 2.5rem;
      background: rgba(22, 22, 22, 0.76);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      border-right: 1px solid rgba(255, 255, 255, 0.07);
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.55);
      text-align: center;
    }
    footer p { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #787878; margin-bottom: 0; }
    footer .colophon { margin-top: 0.4rem; color: #5e5e5e; font-size: 0.7rem; }
    @media (max-width: 768px) {
      nav { padding: 0 1rem; background: rgba(22, 22, 22, 0.88); }
      nav ul { gap: 1rem; }

    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }

<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <canvas id="life" aria-hidden="true"></canvas>

  <nav role="navigation" aria-label="Main navigation">
    <a href="/" class="name">tiboitel</a>
    <ul>
      <li><a href="/#about">about</a></li>
      <li><a href="/#experience">experience</a></li>
      <li><a href="/#projects">projects</a></li>
      <li><a href="/#posts">posts</a></li>
      <li><a href="/#contact">contact</a></li>
    </ul>
  </nav>

  <main id="main">
    <p class="error-code">404</p>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a href="/" class="home-link">&larr; back home</a>
  </main>

  <footer>
    <p>&copy; 2025 Timothee Boitelle</p>
    <p class="colophon">Built with vanilla HTML, CSS, and JS. No frameworks were harmed.</p>
  </footer>

  <script>
    (function () {
      var canvas = document.getElementById('life');
      var ctx = canvas.getContext('2d');
      var cell = 5;
      var cols, rows, grid, next;
      var alive = '#2c2c2c';
      var dead = '#1a1a1a';
      var interval = 100;
      var last = 0;
      var paused = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        var newCols = Math.ceil(canvas.width / cell);
        var newRows = Math.ceil(canvas.height / cell);
        if (newCols !== cols || newRows !== rows) {
          cols = newCols;
          rows = newRows;
          seed();
        }
      }

      function seed() {
        grid = [];
        for (var i = 0; i < rows; i++) {
          grid[i] = [];
          for (var j = 0; j < cols; j++) {
            grid[i][j] = Math.random() < 0.15 ? 1 : 0;
          }
        }
      }

      function neighbors(r, c) {
        var count = 0;
        for (var dr = -1; dr <= 1; dr++) {
          for (var dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            var nr = (r + dr + rows) % rows;
            var nc = (c + dc + cols) % cols;
            count += grid[nr][nc];
          }
        }
        return count;
      }

      function step() {
        next = [];
        for (var i = 0; i < rows; i++) {
          next[i] = [];
          for (var j = 0; j < cols; j++) {
            var n = neighbors(i, j);
            if (grid[i][j]) {
              next[i][j] = (n === 2 || n === 3) ? 1 : 0;
            } else {
              next[i][j] = (n === 3) ? 1 : 0;
            }
          }
        }
        grid = next;
      }

      function draw() {
        ctx.fillStyle = dead;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = alive;
        for (var i = 0; i < rows; i++) {
          for (var j = 0; j < cols; j++) {
            if (grid[i][j]) {
              ctx.fillRect(j * cell, i * cell, cell - 1, cell - 1);
            }
          }
        }
      }

      function loop(ts) {
        if (!paused && ts - last > interval) {
          step();
          draw();
          last = ts;
        }
        requestAnimationFrame(loop);
      }

      resize();
      draw();
      window.addEventListener('resize', resize);
      requestAnimationFrame(loop);
    })();
  </script>

</body>
